[reconfigure]
command:/usr/local/sbin/gwmonitor-service.php reconfigure
parameters:
type:script_output
message:gwmonitor reconfigure
description:GW Monitor Reconfigure

[status]
command:/usr/local/sbin/gwmonitor-service.php status
parameters:
type:script_output
message:gwmonitor status
description:GW Monitor Status

[start]
command:/usr/local/sbin/gwmonitor-service.php start
parameters:%s
type:script_output
message:gwmonitor start
description:GW Monitor Start Instance

[stop]
command:/usr/local/sbin/gwmonitor-service.php stop
parameters:%s
type:script_output
message:gwmonitor stop
description:GW Monitor Stop Instance

[watchdog]
command:/usr/local/sbin/gwmonitor-service.php watchdog
parameters:
type:script_output
message:gwmonitor watchdog
description:GW Monitor Watchdog

[listinterfaces]
command:/usr/local/sbin/gwmonitor-list-interfaces.php
parameters:
type:script_output
message:gwmonitor list interfaces
description:GW Monitor List Interfaces